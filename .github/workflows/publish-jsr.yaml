name: Publish JSR

# Manual escape hatch. semantic-release normally publishes JSR as part of Release; this exists for
# when a release run publishes npm but dies before reaching JSR, leaving the two registries out of
# sync. Publishes whatever version is currently in jsr.json.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # JSR authenticates via OIDC — no token or secret required
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Publish to JSR
        run: pnpm dlx jsr publish
